name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      # GitHub-hosted runners ship with Go preinstalled (1.24+ on current images).
      # actions/setup-go intentionally omitted while codeload.github.com fails to
      # serve its tarball (all version SHAs return 404 — open issue with GitHub).
      - name: Show Go version
        run: go version

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...
